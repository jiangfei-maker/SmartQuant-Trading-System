name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        python -m pytest tests/test_ths_trader.py tests/test_data_processor.py tests/test_app.py -v --html=tests/reports/unit_test_report.html --self-contained-html

    - name: Run integration tests
      run: |
        python -m pytest tests/test_integration.py -v --html=tests/reports/integration_test_report.html --self-contained-html

    - name: Upload test reports
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: tests/reports/

  deploy:
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy application
      run: |
        # 这里添加部署命令
        echo "Deploying application..."

    - name: Notify deployment
      run: |
        echo "Application deployed successfully!"